services:
  backend:
    build: ./backend
    command: uv run fastapi dev app/main.py --host 0.0.0.0 --port 8000
    volumes:
      - ./backend:/app
      - backend_venv:/app/.venv
    ports:
      - "8000:8000"
    env_file:
      - .env

  # Pas de Dockerfile dédié : le serveur de dev Vite tourne directement sur
  # une image node, sources montées en volume pour le hot-reload. Un
  # Dockerfile de build de prod (nginx + assets statiques) viendra en Phase 6.
  frontend:
    image: node:22-slim
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    env_file:
      - frontend/.env

volumes:
  backend_venv:
  frontend_node_modules:
